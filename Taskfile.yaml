version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .

  generate:
    desc: Regenerate counterfeiter fakes
    cmds:
      - go generate ./internal/repoops

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test-e2e-real:
    desc: Run the real Linear and GitHub end-to-end Go test
    cmds:
      - go test -v -tags real_e2e ./internal/service

  test-e2e-ui:
    desc: Run the Playwright end-to-end tests
    dir: e2e/playwright
    cmds:
      - npm test

  test-e2e:
    desc: Run the full end-to-end test suite
    deps:
      - test-e2e-real
      - test-e2e-ui

  build:
    desc: Build the service
    cmds:
      - go build ./...

  build-colin:
    desc: Build a local `colin` binary in the repo root
    cmds:
      - go build -o ./colin .

  release-check:
    desc: Validate the GoReleaser release configuration
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@v2.15.2 check

  release-snapshot:
    desc: Build local snapshot release artifacts into `dist/`
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@v2.15.2 release --snapshot --clean

  vhs.wizard:
    desc: Build `colin` and render the VHS setup wizard GIF
    deps:
      - build-colin
    preconditions:
      - sh: test -n "$LINEAR_API_KEY"
        msg: LINEAR_API_KEY must be exported before rendering wizard.tape
      - sh: test -n "$GITHUB_TOKEN"
        msg: GITHUB_TOKEN must be exported before rendering wizard.tape
      - sh: command -v ttyd >/dev/null 2>&1
        msg: ttyd must be installed and on PATH before rendering wizard.tape
      - sh: command -v ffmpeg >/dev/null 2>&1
        msg: ffmpeg must be installed and on PATH before rendering wizard.tape
    cmds:
      - PATH=$PATH:. go tool vhs docs/wizard.tape

  check:
    desc: Run formatting, vet, and tests
    deps:
      - fmt
      - vet
      - test

  ci:
    desc: Run non-mutating CI checks
    cmds:
      - |
        files=$(gofmt -l .); if [ -n "$files" ]; then
          echo "gofmt needs to be run on:"
          echo "$files"
          exit 1
        fi
      - go vet ./...
      - go test ./...

  run:
    desc: Run Colin with the checked-in WORKFLOW.md
    cmds:
      - go run .

  run-workflow:
    desc: Run Colin with an explicit workflow path
    cmds:
      - go run . {{.WORKFLOW}}
