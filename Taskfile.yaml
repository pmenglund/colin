version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test-e2e-real:
    desc: Run the real Linear and GitHub end-to-end Go test
    cmds:
      - go test -v -tags real_e2e ./internal/service

  test-e2e-ui:
    desc: Run the Playwright end-to-end tests
    dir: e2e/playwright
    cmds:
      - npm test

  test-e2e:
    desc: Run the full end-to-end test suite
    deps:
      - test-e2e-real
      - test-e2e-ui

  build:
    desc: Build the service
    cmds:
      - go build ./...

  check:
    desc: Run formatting, vet, and tests
    deps:
      - fmt
      - vet
      - test

  run:
    desc: Run Colin with the checked-in WORKFLOW.md
    cmds:
      - go run .

  run-workflow:
    desc: Run Colin with an explicit workflow path
    cmds:
      - go run . {{.WORKFLOW}}
