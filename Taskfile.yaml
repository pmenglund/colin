version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  build:
    desc: Build the service
    cmds:
      - go build ./...

  check:
    desc: Run formatting, vet, and tests
    deps:
      - fmt
      - vet
      - test

  run:
    desc: Run Colin with the checked-in WORKFLOW.md
    cmds:
      - go run .

  run-workflow:
    desc: Run Colin with an explicit workflow path
    cmds:
      - go run . {{.WORKFLOW}}
